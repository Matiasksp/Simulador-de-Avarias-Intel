<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <title>Simulador de Avarias Intel</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        body {
            background: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #container > * {
            width: 100vw;  
            height: 100vh; 
            object-fit: contain;
        }
        #container > * {
            max-width: 100%;
            max-height: 100%;
            /* Pode ajustar a proporção base aqui se 4:3 não for ideal, 
               mas parece ser a correta para este tipo de jogo antigo */
            aspect-ratio: 4 / 3; 
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "forceScale": true,
            "forceCodePage": true, //
        };

        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("container");
            container.appendChild(player);

            player.load({
                url: "00000003.swf", 
                allowScriptAccess: true,
                allowNetworking: "all", 
                quality: "best", 
                scale: "showAll", 
                wmode: "direct", 
                autoplay: "on",
                unmuteOverlay: "hidden"
            });
        });
    </script>
</body>
</html>
